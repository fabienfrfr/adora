nodes:
  - id: simulator
    path: nodes/simulator/simulator/main.py
    inputs:
      tick: dora/timer/millis/50
      action: vla-brain/action
    outputs:
      - image

  - id: vla-brain
    path: nodes/vla-brain/vla_brain/main.py
    inputs:
      image: simulator/image
      instruction: terminal_control/instruction
    outputs:
      - action
  
  - id: visualizer
    path: nodes/visualizer/visualizer/main.py
    inputs:
      image: simulator/image

  - id: terminal_control
    path: nodes/controller/controller/main.py
    outputs:
      - instruction