nodes:
  - id: timer
    operators:
      - id: timer-op
        python: dora-timer
        args: --interval 0.033

  - id: simulation
    path: src/adora/simulation_op.py
    inputs:
      tick: timer/timer-op/tick
      action: vla_op/action
    outputs:
      - image

  - id: vla_op
    path: src/adora/vla_op.py
    inputs:
      image: simulation/image
    outputs:
      - action